trigger:
 branches:
   include:
     - main

pool: infrapipeline

stages:
  - stage:
    displayName: Terraform Infra Pipeline
    jobs:
      - job:
        displayName: Terraform init plan
        steps:
          - task: tfsec@1
            inputs:
              version: 'v1.26.0'
            continueOnError: true
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'infrapipeline'
              backendAzureRmStorageAccountName: 'infrapipeline002'
              backendAzureRmContainerName: 'infracontainer'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: 'infrapipeline'
          - task: ManualIntervention@8
            inputs:
              instructions: 'vikasrai.tech@gmail.com'
              emailRecipients: 'vikasrai.tech@gmail.com'

  - stage: InfraStage2
    displayName: TerraformApply
    jobs:
      - job: TerraformApply
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'infrapipeline'
              backendAzureRmStorageAccountName: 'infrapipeline002'
              backendAzureRmContainerName: 'infracontainer'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'infrapipeline'