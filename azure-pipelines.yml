trigger:
 branches:
   include:
     - main

pool: infrapipeline

stages:
  - stage: 
    jobs:
      - job: 
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'infrapipeline'
              backendAzureRmStorageAccountName: 'infrapipeline002'
              backendAzureRmContainerName: 'infracontainer'
              backendAzureRmKey: 'terraform.tfstate'